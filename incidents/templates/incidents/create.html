<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Incidente | CyberLab</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .container { max-width: 600px; margin: 40px auto; background: white; padding: 30px 36px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 22px; font-size: 22px; }
        label { display: block; font-size: 14px; color: #555; margin-bottom: 4px; margin-top: 14px; }
        input[type=text], textarea, select { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        input[type=text]:focus, textarea:focus, select:focus { outline: none; border-color: #2980b9; }
        textarea { resize: vertical; min-height: 100px; }
        input[type=checkbox] { margin-top: 14px; margin-right: 6px; }
        .form-control { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .form-control:focus { outline: none; border-color: #2980b9; }
        p label { font-size: 14px; color: #555; }
        button[type=submit] { margin-top: 22px; padding: 10px 24px; background: #2980b9; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        button[type=submit]:hover { background: #1f6391; }
        .back { display: inline-block; margin-top: 14px; font-size: 13px; color: #2980b9; text-decoration: none; }
        ul.errorlist { color: #c0392b; font-size: 13px; padding-left: 18px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reportar Nuevo Incidente</h1>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Guardar</button>
        </form>

        <a href="{% url 'incidents:home' %}" class="back">← Volver a la lista</a>
    </div>
</body>
</html>
