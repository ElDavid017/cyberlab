<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Incidente | CyberLab</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 36px 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); max-width: 440px; width: 100%; text-align: center; }
        h1 { color: #e74c3c; font-size: 22px; margin-bottom: 16px; }
        p { font-size: 14px; color: #555; margin-bottom: 8px; }
        .incident-name { font-size: 17px; font-weight: bold; color: #2c3e50; margin: 16px 0 24px; }
        .actions { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        button[type=submit] { padding: 10px 24px; background: #e74c3c; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        button[type=submit]:hover { background: #c0392b; }
        .btn-cancel { display: inline-block; padding: 10px 24px; background: #ecf0f1; color: #2c3e50; border-radius: 4px; text-decoration: none; font-size: 14px; }
        .btn-cancel:hover { background: #d5d8dc; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Confirmar Eliminacion</h1>
        <p>Estas seguro que quieres eliminar este incidente?</p>
        <p>Esta accion no se puede deshacer.</p>

        <div class="incident-name">{{ incident.title }}</div>

        <div class="actions">
            <a href="{% url 'incidents:detail' pk=incident.pk %}" class="btn-cancel">Cancelar</a>
            <form method="POST">
                {% csrf_token %}
                <button type="submit">Si, Eliminar</button>
            </form>
        </div>
    </div>
</body>
</html>
