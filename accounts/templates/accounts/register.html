<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | CyberLab</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 35px 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); width: 100%; max-width: 420px; }
        h1 { color: #2c3e50; margin-bottom: 20px; font-size: 22px; }
        p { margin-top: 14px; font-size: 13px; color: #666; text-align: center; }
        p a { color: #2980b9; text-decoration: none; }
        input, select { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-top: 4px; }
        input:focus, select:focus { outline: none; border-color: #2980b9; }
        label { font-size: 14px; color: #555; display: block; margin-top: 12px; }
        ul { color: #c0392b; font-size: 13px; margin-top: 4px; padding-left: 18px; }
        .errorlist { color: #c0392b; font-size: 13px; padding-left: 18px; }
        button[type=submit] { width: 100%; margin-top: 22px; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
        button[type=submit]:hover { background: #1e8449; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Crear Cuenta</h1>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Registrarse</button>
        </form>

        <p>Ya tienes cuenta? <a href="{% url 'accounts:login' %}">Inicia sesion</a></p>
    </div>
</body>
</html>
