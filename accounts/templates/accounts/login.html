<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | CyberLab</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 35px 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); width: 100%; max-width: 380px; }
        h1 { color: #2c3e50; margin-bottom: 20px; font-size: 22px; }
        .error-msg { background: #fde8e8; color: #c0392b; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; }
        label { display: block; font-size: 14px; color: #555; margin-bottom: 4px; margin-top: 12px; }
        input[type=text], input[type=password] { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        input[type=text]:focus, input[type=password]:focus { outline: none; border-color: #2980b9; }
        button[type=submit] { width: 100%; margin-top: 20px; padding: 10px; background: #2980b9; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
        button[type=submit]:hover { background: #1f6391; }
        p { margin-top: 16px; font-size: 13px; color: #666; text-align: center; }
        p a { color: #2980b9; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>CyberLab — Login</h1>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Iniciar sesion</button>
        </form>

        <p>No tienes cuenta? <a href="{% url 'accounts:register' %}">Registrate aqui</a></p>
    </div>
</body>
</html>
